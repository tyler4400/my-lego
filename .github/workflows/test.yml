name: Test

# 触发条件：所有分支 push + 任何 PR（用于 PR 页面 status check）
on:
  push:
  pull_request:

# 同分支后续 push 自动取消前次跑，节省 CI 额度
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-craft:
    name: Test @my-lego/craft
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run craft unit tests
        run: pnpm test:craft
